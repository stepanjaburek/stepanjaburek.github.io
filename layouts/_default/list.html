{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<ul class="entry-list">
  {{ range .Pages.ByDate.Reverse }}
    <li>
      <a class="entry-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ if not .Date.IsZero }}<div class="entry-meta">{{ .Date.Format "January 2, 2006" }}</div>{{ end }}
      {{ with .Params.description }}<div class="entry-desc">{{ . }}</div>{{ end }}
    </li>
  {{ end }}
</ul>
{{ end }}
